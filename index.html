<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bir Güzel İcin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Seni Seviyorum Güzel Nişanlım ❤️</h1>
            <p class="subtitle">Her anımız, en güzel hikayemiz.</p>
        </header>

        <section class="counter-section">
            <div id="love-counter">
                <span id="days">0</span> Gün 
                <span id="hours">0</span> Saat 
                <span id="minutes">0</span> Dakika
            </div>
            <p>Birlikte geçen her saniye çok kıymetli...</p>
        </section>

        <section class="poems-section">
            <h2>Şiir Defterimiz</h2>
            <p>Sana yazdığım tüm mısraları burada topladım.</p>
            <a href="siirler.html" class="poem-link">Şiirlerimizi Oku</a>
        </section>

        <section class="extra">
            <button id="surprise-btn">Buraya Tıkla!</button>
            <div id="hidden-message" class="hidden">
                <p>İyi ki varsın, hayatımın en güzel hediyesi...✨<br>Güneşim..</p>
            </div>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
